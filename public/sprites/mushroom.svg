<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="32" height="32">
  <!-- Cap spots -->
  <rect x="0" y="4"  width="16" height="8" fill="#E52521"/>
  <!-- Cap top round -->
  <rect x="2" y="2"  width="12" height="2" fill="#E52521"/>
  <rect x="4" y="1"  width="8"  height="1" fill="#E52521"/>
  <rect x="5" y="0"  width="6"  height="1" fill="#E52521"/>
  <!-- White spots on cap -->
  <rect x="2" y="3"  width="3" height="3" fill="#fff"/>
  <rect x="3" y="2"  width="1" height="1" fill="#fff"/>
  <rect x="11" y="3" width="3" height="3" fill="#fff"/>
  <rect x="11" y="2" width="1" height="1" fill="#fff"/>
  <rect x="7"  y="4" width="2" height="2" fill="#fff"/>
  <!-- Face -->
  <rect x="3"  y="7"  width="10" height="4" fill="#FFB47A"/>
  <!-- Eyes -->
  <rect x="4"  y="8"  width="2" height="2" fill="#fff"/>
  <rect x="10" y="8"  width="2" height="2" fill="#fff"/>
  <rect x="5"  y="9"  width="1" height="1" fill="#000"/>
  <rect x="11" y="9"  width="1" height="1" fill="#000"/>
  <!-- Stem -->
  <rect x="4"  y="11" width="8" height="4" fill="#FFB47A"/>
  <rect x="3"  y="12" width="10" height="3" fill="#FFB47A"/>
  <!-- Feet -->
  <rect x="2"  y="14" width="4" height="2" fill="#FFB47A"/>
  <rect x="10" y="14" width="4" height="2" fill="#FFB47A"/>
</svg>
